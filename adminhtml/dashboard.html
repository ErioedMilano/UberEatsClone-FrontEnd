<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - FoodieExpress</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<header>
    <h1><i class="fas fa-crown"></i> Admin Panel</h1>
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="restaurants.html">Restaurants</a>
        <a href="orders.html">Bestellingen</a>
        <a href="#" id="logout-btn">Uitloggen</a>
    </nav>
</header>
<main>
    <h2>Dashboard</h2>

    <!-- Stat cards -->
    <div class="stats-grid">
        <div class="stat-card">
            <h3>Aantal bestellingen vandaag</h3>
            <p class="stat-number" id="total-orders-today">0</p>
        </div>
        <div class="stat-card">
            <h3>Omzet vandaag</h3>
            <p class="stat-number" id="revenue-today">€0,00</p>
        </div>
        <div class="stat-card">
            <h3>Totaal bestellingen</h3>
            <p class="stat-number" id="total-orders">0</p>
        </div>
    </div>

    <!-- Donut charts for top restaurants and dishes -->
    <div class="charts-row">
        <div class="chart-card">
            <h3>Meest bestelde restaurants</h3>
            <div class="chart-container">
                <canvas id="restaurants-chart"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <h3>Meest bestelde gerechten</h3>
            <div class="chart-container">
                <canvas id="dishes-chart"></canvas>
            </div>
        </div>
    </div>

    <!-- Line chart for last 24 hours -->
    <div class="chart-card full-width">
        <h3>Bestellingen laatste 24 uur</h3>
        <div class="chart-container">
            <canvas id="orders-chart"></canvas>
        </div>
    </div>
</main>

<script src="../adminjs/admin-api.js"></script>
<script src="../adminjs/dashboard.js"></script>
<script src="../adminjs/admin.js"></script>
</body>
</html>
