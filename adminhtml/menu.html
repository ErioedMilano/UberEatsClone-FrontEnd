<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu beheren - FoodieExpress</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<header>
    <h1><i class="fas fa-crown"></i> Admin Panel</h1>
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="restaurants.html">Restaurants</a>
        <a href="orders.html">Bestellingen</a>
        <a href="#" id="logout-btn">Uitloggen</a>
    </nav>
</header>
<main>
    <h2>Menu beheren</h2>
    <div class="menu-controls">
        <div class="menu-controls">
            <div class="restaurant-selector">
                <label for="restaurant-select">Kies restaurant:</label>
                <select id="restaurant-select">...</select>
            </div>
        </div>
        <button class="btn-add" id="add-menu-btn"><i class="fas fa-plus"></i> Nieuw gerecht</button>
    </div>
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Afbeelding</th>
            <th>Naam</th>
            <th>Beschrijving</th>
            <th>Prijs</th>
            <th>Acties</th>
        </tr>
        </thead>
        <tbody id="menu-table-body">
        <tr><td colspan="6">Selecteer eerst een restaurant</td></tr>
        </tbody>
    </table>
    <button class="btn-back" onclick="window.location.href='restaurants.html'"><i class="fas fa-arrow-left"></i> Terug naar restaurants</button>
</main>

<!-- Modal voor menu-item toevoegen/bewerken -->
<div id="menu-form-modal" class="modal">
    <div class="modal-content">
        <span class="close" id="close-menu-modal">&times;</span>
        <h3 id="menu-form-title">Nieuw gerecht</h3>
        <form id="menu-form">
            <input type="hidden" id="menu-item-id">
            <label for="menu-name">Naam</label>
            <input type="text" id="menu-name" required>
            <label for="menu-description">Beschrijving</label>
            <textarea id="menu-description" rows="2"></textarea>
            <label for="menu-price">Prijs (€)</label>
            <input type="number" step="0.01" min="0" id="menu-price" required>
            <label for="menu-image">Afbeelding URL</label>
            <input type="url" id="menu-image" placeholder="https://...">
            <div style="margin-top: 1rem;">
                <button type="submit" class="btn-save">Opslaan</button>
                <button type="button" id="cancel-menu-form" class="btn-cancel">Annuleren</button>
            </div>
        </form>
    </div>
</div>

<script src="../adminjs/admin.js"></script>
<script src="../adminjs/admin-api.js"></script>
<script src="../adminjs/menu.js"></script>
</body>
</html>
